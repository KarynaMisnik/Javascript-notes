<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find String Length</title>
</head>
<body>
    <input id="textInput">
    <p id="count"></p>
    <p id="countWithoutSpace"></p>


    <script>
         const input = document.getElementById("textInput");
         const count = document.getElementById("count");
         const countWithoutSpace = document.getElementById("countWithoutSpace");
           

            input.addEventListener("input", showResult);

            function showResult(){
                let result = input.value.length;
                let resultWithoutSpace = input.value.replace(/\s/g, "").length;
                count.textContent = "With space: " + result;
                countWithoutSpace.textContent = "Without space: " + resultWithoutSpace;


            }

    </script>
</body>
</html>
